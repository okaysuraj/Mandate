<!-- Micro-interaction script -->
<script>
        document.querySelectorAll('button[class*="rounded-full relative"]').forEach(btn => {
            btn.addEventListener('click', () => {
                const isActive = btn.classList.contains('bg-primary');
                const thumb = btn.querySelector('span');
                
                if(isActive) {
                    btn.classList.remove('bg-primary');
                    btn.classList.add('bg-secondary-container');
                    thumb.classList.remove('right-1');
                    thumb.classList.add('left-1');
                    thumb.classList.remove('bg-on-primary');
                    thumb.classList.add('bg-on-surface');
                } else {
                    btn.classList.remove('bg-secondary-container');
                    btn.classList.add('bg-primary');
                    thumb.classList.remove('left-1');
                    thumb.classList.add('right-1');
                    thumb.classList.remove('bg-on-surface');
                    thumb.classList.add('bg-on-primary');
                }
            });
        });
    </script>
