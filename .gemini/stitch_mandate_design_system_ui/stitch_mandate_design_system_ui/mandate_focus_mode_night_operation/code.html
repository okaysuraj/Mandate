<style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .timer-glow {
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.15));
        }
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.03);
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            animation: scan 8s linear infinite;
        }
        @keyframes scan {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(100vh); }
        }
        .progress-circle {
            transition: stroke-dashoffset 1s linear;
        }
    </style>

<body class="font-body-md text-body-md h-screen w-full flex items-center justify-center bg-background text-on-background">
<!-- Atmospheric Overlay -->
<div class="fixed inset-0 pointer-events-none z-50">
<div class="scanline"></div>
</div>
<!-- Background Subtle Noise/Texture -->
<div class="fixed inset-0 opacity-[0.05] pointer-events-none" style="background-image: url('https://www.transparenttextures.com/patterns/micro-carbon.png')"></div>
<!-- Main Canvas -->
<main class="relative z-10 w-full max-w-container-max px-lg flex flex-col items-center justify-between h-[870px]">
<!-- Top Status Bar (Minimal) -->
<header class="w-full flex justify-between items-center opacity-40 hover:opacity-100 transition-opacity duration-500">
<div class="flex items-center gap-md">
<span class="font-label-caps text-label-caps tracking-widest text-primary">MANDATE // NIGHT_OPS.OS</span>
<span class="w-1 h-1 bg-primary rounded-full"></span>
<span class="font-label-caps text-label-caps" id="live-clock">00:00:00</span>
</div>
<div class="flex items-center gap-lg">
<button class="flex items-center gap-xs font-label-caps text-label-caps hover:bg-surface-container transition-colors px-md py-xs rounded-full" onclick="window.history.back()">
<span class="material-symbols-outlined text-[16px]">close</span>
                    EXIT FOCUS
                </button>
</div>
</header>
<!-- Center Piece: Timer & Identity -->
<section class="flex flex-col items-center gap-xl text-center">
<!-- Macro Timer Display -->
<div class="relative flex items-center justify-center">
<!-- SVG Progress Circle -->
<svg class="absolute w-[450px] h-[450px] transform -rotate-90 md:w-[600px] md:h-[600px]">
<circle cx="50%" cy="50%" fill="transparent" r="48%" stroke="#1c1b1b" stroke-width="1"></circle>
<circle class="progress-circle" cx="50%" cy="50%" fill="transparent" id="timer-progress" r="48%" stroke="#ffffff" stroke-dasharray="1800" stroke-dashoffset="1800" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<div class="flex flex-col items-center">
<div class="font-display-lg text-[120px] md:text-[220px] font-extrabold tracking-tighter leading-none timer-glow select-none text-white" id="countdown">
                        25:00
                    </div>
<div class="mt-xs font-label-caps text-label-caps tracking-[0.4em] text-primary opacity-60">
                        ESTIMATED COMPLETION 14:45
                    </div>
</div>
</div>
<!-- Active Task -->
<div class="flex flex-col gap-sm">
<div class="flex items-center justify-center gap-md">
<span class="w-12 h-[1px] bg-outline-variant"></span>
<h1 class="font-label-caps text-label-caps text-primary tracking-[0.2em] uppercase">Operating</h1>
<span class="w-12 h-[1px] bg-outline-variant"></span>
</div>
<h2 class="font-headline-lg text-headline-lg font-black tracking-tight text-white">CORE SYNTHESIS</h2>
</div>
</section>
<!-- Bottom Action: Commitment -->
<footer class="w-full flex flex-col items-center gap-lg">
<div class="flex gap-xl opacity-40">
<div class="flex flex-col items-center gap-xs">
<span class="font-label-sm text-label-sm">CPU LOAD</span>
<span class="font-label-caps text-label-caps">12%</span>
</div>
<div class="flex flex-col items-center gap-xs">
<span class="font-label-sm text-label-sm">SESSIONS</span>
<span class="font-label-caps text-label-caps">04/08</span>
</div>
<div class="flex flex-col items-center gap-xs">
<span class="font-label-sm text-label-sm">STREAK</span>
<span class="font-label-caps text-label-caps">12D</span>
</div>
</div>
<!-- Big Confirmation Button -->
<div class="relative group">
<!-- Outer Ring Animation -->
<div class="absolute -inset-4 border border-white/20 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-700 scale-90 group-hover:scale-100"></div>
<button class="relative overflow-hidden bg-primary text-on-primary font-label-caps text-label-caps px-[64px] py-xl rounded-full tracking-[0.25em] hover:scale-[1.02] active:scale-95 transition-all duration-300 shadow-[0_0_40px_rgba(255,255,255,0.1)]" id="commit-btn">
<span class="relative z-10">COMMIT ACTION</span>
<!-- Shine effect -->
<div class="absolute top-0 -left-full w-1/2 h-full bg-gradient-to-r from-transparent via-black/10 to-transparent skew-x-12 transition-all duration-1000 group-hover:left-[150%]"></div>
</button>
</div>
</footer>
</main>
<!-- Micro-interactions Script -->
<script>
        // Clock Update
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-GB', { hour12: false });
            document.getElementById('live-clock').textContent = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Timer Logic
        let timeLeft = 25 * 60;
        const countdownEl = document.getElementById('countdown');
        const progressCircle = document.getElementById('timer-progress');
        const totalDuration = 25 * 60;
        const circumference = 1800; // Matching stroke-dasharray

        function updateTimer() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            countdownEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // Update Progress Circle
            const offset = circumference - (timeLeft / totalDuration) * circumference;
            progressCircle.style.strokeDashoffset = offset;

            if (timeLeft > 0) {
                timeLeft--;
            } else {
                clearInterval(timerInterval);
                countdownEl.classList.add('animate-pulse');
            }
        }
        const timerInterval = setInterval(updateTimer, 1000);
        updateTimer();

        // Button Click Interaction
        const commitBtn = document.getElementById('commit-btn');
        commitBtn.addEventListener('click', () => {
            const originalText = commitBtn.innerText;
            commitBtn.innerHTML = "PROCESSED";
            commitBtn.classList.replace('bg-primary', 'bg-tertiary-fixed');
            commitBtn.classList.replace('text-on-primary', 'text-on-tertiary-fixed');
            
            // Add a temporary subtle flash
            const flash = document.createElement('div');
            flash.className = 'fixed inset-0 bg-white z-[100] pointer-events-none opacity-10';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 100);

            setTimeout(() => {
                commitBtn.innerHTML = "COMMIT ACTION";
                commitBtn.classList.replace('bg-tertiary-fixed', 'bg-primary');
                commitBtn.classList.replace('text-on-tertiary-fixed', 'text-on-primary');
            }, 2000);
        });

        // Keydown listener for 'Focus Escape'
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.body.style.opacity = '0';
                setTimeout(() => window.history.back(), 300);
            }
        });
    </script>
</body></html>
