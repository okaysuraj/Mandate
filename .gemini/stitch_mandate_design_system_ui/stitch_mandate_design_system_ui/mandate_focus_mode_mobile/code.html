<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>MANDATE // SYSTEM.OS - FOCUS MODE</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;700;800&family=JetBrains+Mono:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@100..900&family=JetBrains+Mono:wght@100..900&display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
        }
        @keyframes pulse-subtle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .animate-pulse-subtle {
            animation: pulse-subtle 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .timer-stroke {
            stroke-dasharray: 283;
            stroke-dashoffset: 70;
            transition: stroke-dashoffset 1s linear;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-highest": "#e1e2e4",
                      "on-tertiary-container": "#00983d",
                      "on-primary-fixed": "#1c1b1b",
                      "on-background": "#191c1e",
                      "on-secondary-fixed-variant": "#454749",
                      "tertiary-fixed-dim": "#3ce36a",
                      "tertiary-fixed": "#69ff87",
                      "primary-container": "#1c1b1b",
                      "surface-bright": "#f9f9fb",
                      "on-error": "#ffffff",
                      "secondary-fixed-dim": "#c6c6c8",
                      "on-primary-container": "#858383",
                      "surface-container": "#edeef0",
                      "on-surface": "#191c1e",
                      "inverse-surface": "#2e3132",
                      "secondary-container": "#dfdfe1",
                      "secondary-fixed": "#e2e2e4",
                      "surface-container-high": "#e7e8ea",
                      "secondary": "#5d5e60",
                      "on-secondary-fixed": "#1a1c1d",
                      "on-primary-fixed-variant": "#474746",
                      "on-error-container": "#93000a",
                      "on-secondary": "#ffffff",
                      "surface-container-lowest": "#ffffff",
                      "surface": "#f9f9fb",
                      "on-secondary-container": "#616365",
                      "outline-variant": "#c4c7c7",
                      "surface-variant": "#e1e2e4",
                      "on-tertiary": "#ffffff",
                      "primary-fixed": "#e5e2e1",
                      "inverse-primary": "#c8c6c5",
                      "error-container": "#ffdad6",
                      "background": "#f9f9fb",
                      "surface-container-low": "#f3f3f5",
                      "surface-dim": "#d9dadc",
                      "error": "#ba1a1a",
                      "on-tertiary-fixed": "#002108",
                      "surface-tint": "#5f5e5e",
                      "primary": "#000000",
                      "outline": "#747878",
                      "on-primary": "#ffffff",
                      "on-tertiary-fixed-variant": "#00531e",
                      "on-surface-variant": "#444748",
                      "tertiary-container": "#002108",
                      "tertiary": "#000000",
                      "primary-fixed-dim": "#c8c6c5",
                      "inverse-on-surface": "#f0f1f3"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "spacing": {
                      "gutter": "24px",
                      "unit": "4px",
                      "container-max": "1440px",
                      "xl": "64px",
                      "md": "16px",
                      "lg": "32px",
                      "xs": "4px",
                      "sm": "8px"
              },
              "fontFamily": {
                      "label-sm": ["JetBrains Mono"],
                      "headline-lg-mobile": ["Hanken Grotesk"],
                      "label-caps": ["JetBrains Mono"],
                      "display-lg": ["Hanken Grotesk"],
                      "headline-lg": ["Hanken Grotesk"],
                      "body-md": ["Hanken Grotesk"]
              },
              "fontSize": {
                      "label-sm": ["12px", {"lineHeight": "1.4", "letterSpacing": "0em", "fontWeight": "500"}],
                      "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "label-caps": ["11px", {"lineHeight": "1.4", "letterSpacing": "0.1em", "fontWeight": "600"}],
                      "display-lg": ["64px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "800"}],
                      "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],

          },
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-primary min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Top Navigation Anchor (As specified in JSON) -->
<header class="w-full sticky top-0 z-50 flex items-center justify-between px-md py-sm w-full border-b border-outline-variant dark:border-on-surface-variant bg-surface">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" data-icon="menu">menu</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold tracking-tighter text-primary">MANDATE</h1>
</div>
<div class="flex items-center gap-xs">
<span class="font-label-caps text-label-caps text-secondary">SYSTEM.OS</span>
<div class="w-[1px] h-3 bg-outline-variant mx-xs"></div>
<span class="font-label-caps text-label-caps text-primary" id="current-time">14:20</span>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-primary" data-icon="account_circle">account_circle</span>
</div>
</header>
<!-- Main Focus Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-gutter relative">
<!-- Background Atmospheric Element (Subtle grid) -->
<div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(circle at 2px 2px, #000 1px, transparent 0); background-size: 24px 24px;"></div>
<!-- Timer Section -->
<div class="w-full max-w-sm flex flex-col items-center gap-lg">
<!-- Circular Timer -->
<div class="relative w-72 h-72 flex items-center justify-center">
<svg class="absolute inset-0 w-full h-full -rotate-90" viewbox="0 0 100 100">
<!-- Background Circle (Thin Stroke) -->
<circle class="text-surface-container-highest" cx="50" cy="50" fill="transparent" r="45" stroke="currentColor" stroke-width="1"></circle>
<!-- Progress Circle -->
<circle class="text-primary timer-stroke" cx="50" cy="50" fill="transparent" r="45" stroke="currentColor" stroke-dasharray="283" stroke-dashoffset="70" stroke-linecap="round" stroke-width="1.5"></circle>
</svg>
<div class="flex flex-col items-center">
<span class="font-display-lg text-display-lg tracking-tight font-extrabold">24:57</span>
<div class="mt-xs flex items-center gap-xs">
<span class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse-subtle"></span>
<span class="font-label-caps text-label-caps tracking-widest text-secondary">OPERATING: CORE SYNTHESIS</span>
</div>
</div>
</div>
<!-- Meta Information -->
<div class="text-center">
<p class="font-label-caps text-label-caps text-secondary opacity-60">ESTIMATED COMPLETION</p>
<p class="font-headline-lg-mobile text-headline-lg-mobile font-bold mt-xs">14:45</p>
</div>
</div>
<!-- System Stats Grid (Bento Logic) -->
<div class="w-full max-w-md mt-xl grid grid-cols-3 gap-sm">
<div class="bg-surface-container-lowest border border-outline-variant p-md flex flex-col items-center justify-center text-center">
<span class="font-label-caps text-label-caps text-secondary block mb-xs">CPU LOAD</span>
<span class="font-label-sm text-label-sm text-primary font-bold">12%</span>
</div>
<div class="bg-surface-container-lowest border border-outline-variant p-md flex flex-col items-center justify-center text-center">
<span class="font-label-caps text-label-caps text-secondary block mb-xs">SESSIONS</span>
<span class="font-label-sm text-label-sm text-primary font-bold">04/08</span>
</div>
<div class="bg-surface-container-lowest border border-outline-variant p-md flex flex-col items-center justify-center text-center">
<span class="font-label-caps text-label-caps text-secondary block mb-xs">STREAK</span>
<span class="font-label-sm text-label-sm text-primary font-bold">12D</span>
</div>
</div>
</main>
<!-- Action Section -->
<div class="px-gutter pb-xl pt-lg flex justify-center">
<button class="bg-primary text-on-primary font-label-caps text-label-caps px-xl py-md rounded-full w-full max-w-xs transition-all active:scale-95 hover:bg-opacity-90 tracking-widest font-bold">
            COMMIT ACTION
        </button>
</div>
<!-- Bottom Navigation Shell (Filtered: Not visible for focused task mode as per UX Goal "hide the shell to prioritize the Canvas") -->
<!-- However, we provide the System footer for minimal attribution -->
<footer class="w-full px-gutter py-md bg-surface-container-lowest text-center">
<span class="font-label-sm text-label-sm text-secondary opacity-40 uppercase tracking-tighter">© 2024 MANDATE INDUSTRIAL // ALL PROTOCOLS ACTIVE</span>
</footer>
<script>
        // Simple micro-interaction for time update
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const timeElement = document.getElementById('current-time');
            if (timeElement) timeElement.textContent = `${hours}:${minutes}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Simulate timer countdown visual
        let offset = 70;
        const circle = document.querySelector('.timer-stroke');
        setInterval(() => {
            if (offset < 283) {
                offset += 0.05;
                circle.style.strokeDashoffset = offset;
            }
        }, 100);

        // Haptic feel for button
        const btn = document.querySelector('button');
        btn.addEventListener('click', () => {
            btn.textContent = "SYNCHRONIZING...";
            btn.classList.add('opacity-50');
            setTimeout(() => {
                btn.textContent = "COMMIT ACTION";
                btn.classList.remove('opacity-50');
            }, 2000);
        });
    </script>
</body></html>
